  <text x="295" y="130" font-family="Montserrat, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.3)">&#x2022;</text>
  <text x="315" y="130" font-family="Montserrat, -apple-system, sans-serif" font-size="13" font-weight="500" letter-spacing="4" fill="#C4A265">HUMAN RIGHTS ACTIVIST</text>
  <text x="590" y="130" font-family="Montserrat, -apple-system, sans-serif" font-size="13" fill="rgba(255,255,255,0.3)">&#x2022;</text>
